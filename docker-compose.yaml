services:
  postgres:
    image: ankane/pgvector:latest
    container_name: amisoul-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-amisoul}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amisoul-network
    restart: always

  redis:
    image: redis:alpine
    container_name: amisoul-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - amisoul-network
    restart: always

networks:
  amisoul-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
